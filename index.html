<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>행운의 발표뽑기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  height:calc(100vh - 56px);
  width:100vw;overflow:hidden;
  background:#1a0a2e;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Segoe UI',sans-serif;
  position:relative;
  gap:4px;
}
canvas#starCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

.top-bar{display:flex;flex-direction:column;align-items:center;gap:5px;z-index:2;}
.lights-strip{display:flex;gap:7px;}
.light{width:12px;height:12px;border-radius:50%;animation:blink 0.7s infinite alternate;}
.light:nth-child(even){animation-delay:0.35s;}
@keyframes blink{0%{opacity:1;box-shadow:0 0 8px 3px currentColor;}100%{opacity:0.3;box-shadow:none;}}

.banner-wrap{display:flex;align-items:center;}
.banner{
  background:linear-gradient(135deg,#ffd700 0%,#ffaa00 50%,#ffd700 100%);
  color:#7a1200;font-size:20px;font-weight:700;
  padding:9px 28px;border-radius:4px;
  border:3px solid #ffaa00;
  box-shadow:0 0 0 3px #7a1200,0 4px 18px rgba(255,200,0,0.4);
  letter-spacing:3px;white-space:nowrap;position:relative;
}
.banner::before,.banner::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  width:0;height:0;border-top:22px solid transparent;border-bottom:22px solid transparent;
}
.banner::before{left:-18px;border-right:18px solid #ffaa00;}
.banner::after{right:-18px;border-left:18px solid #ffaa00;}

/* 모드 선택 버튼 */
.mode-wrap{display:flex;gap:10px;z-index:2;}
.mode-btn{
  padding:7px 22px;font-size:14px;font-weight:700;
  border-radius:30px;border:2px solid rgba(255,220,80,0.4);
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);
  cursor:pointer;letter-spacing:1px;transition:all 0.18s;
}
.mode-btn:hover{background:rgba(255,220,80,0.15);color:#ffd700;border-color:#ffd700;}
.mode-btn.active{
  background:linear-gradient(135deg,#ffd700,#ffaa00);
  color:#7a1200;border-color:#ffaa00;
  box-shadow:0 2px 12px rgba(255,180,0,0.4);
}

.main-row{
  display:flex;flex-direction:row;
  align-items:center;justify-content:center;
  gap:50px;z-index:2;width:100%;padding:0 36px;
}
#canvas-wrap{position:relative;flex-shrink:0;}
#wheelCanvas{display:block;border-radius:50%;filter:drop-shadow(0 0 24px rgba(255,200,0,0.4));}
#pointer{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:16px solid transparent;border-right:16px solid transparent;
  border-top:38px solid #ff3b3b;
  filter:drop-shadow(0 2px 6px rgba(255,0,0,0.6));z-index:10;
}
#center-btn{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:70px;height:70px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff 0%,#e8e0ff 100%);
  border:3px solid #aaa;font-size:14px;font-weight:700;
  cursor:pointer;color:#333;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
  transition:transform 0.1s,box-shadow 0.1s;z-index:20;
}
#center-btn:hover{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 0 22px rgba(255,220,0,0.6);}
#center-btn:active{transform:translate(-50%,-50%) scale(0.96);}

.right-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-width:200px;}
.result-card{
  background:rgba(255,255,255,0.06);
  border:2px solid rgba(255,220,80,0.25);
  border-radius:20px;padding:22px 36px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
#result-label{font-size:13px;color:#c9b8ff;letter-spacing:2px;}
#result-num{
  font-size:100px;font-weight:700;line-height:1;
  text-shadow:0 0 24px currentColor;
  transition:transform 0.3s cubic-bezier(.17,.67,.35,1.5);
  color:#ffd700;min-width:120px;text-align:center;
}
.spin-btn-big{
  padding:13px 40px;font-size:17px;font-weight:700;
  background:linear-gradient(135deg,#ffd700,#ffaa00);
  color:#7a1200;border:none;border-radius:40px;
  cursor:pointer;letter-spacing:2px;
  box-shadow:0 4px 20px rgba(255,180,0,0.4);
  transition:transform 0.1s,box-shadow 0.1s;
}
.spin-btn-big:hover{transform:scale(1.06);}
.spin-btn-big:active{transform:scale(0.97);}

.watermark{
  position:fixed;bottom:14px;right:20px;
  font-size:12px;color:rgba(255,255,255,0.2);
  letter-spacing:1px;z-index:10;pointer-events:none;
}
.confetti-piece{
  position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;
  animation:fall 1.8s ease-in forwards;
}
@keyframes fall{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}
  80%{opacity:1;}
  100%{opacity:0;transform:translateY(340px) rotate(900deg) scale(0.5);}
}
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>

<div class="top-bar">
  <div class="lights-strip" id="lights"></div>
  <div class="banner-wrap"><div class="banner">행운의 발표뽑기</div></div>
  <div class="lights-strip" id="lights2"></div>
  <div class="mode-wrap">
    <button class="mode-btn active" id="btn6" onclick="setMode(6)">1 ~ 6</button>
    <button class="mode-btn" id="btn32" onclick="setMode(32)">1 ~ 32</button>
  </div>
</div>

<div class="main-row">
  <div id="canvas-wrap">
    <div id="pointer"></div>
    <canvas id="wheelCanvas"></canvas>
    <button id="center-btn">돌리기</button>
  </div>
  <div class="right-panel">
    <div class="result-card">
      <span id="result-label">★ 결 과 ★</span>
      <span id="result-num">—</span>
    </div>
    <button class="spin-btn-big" id="spinBtn">🎡 돌리기</button>
  </div>
</div>

<div class="watermark">made by 승연T</div>

<script>
// 별 배경
const starCvs=document.getElementById('starCanvas');
const sCtx=starCvs.getContext('2d');
function drawStars(){
  starCvs.width=window.innerWidth;starCvs.height=window.innerHeight;
  sCtx.clearRect(0,0,starCvs.width,starCvs.height);
  for(let i=0;i<130;i++){
    const x=Math.random()*starCvs.width,y=Math.random()*starCvs.height,r=Math.random()*1.6+0.3;
    sCtx.beginPath();sCtx.arc(x,y,r,0,2*Math.PI);
    sCtx.fillStyle=`rgba(255,255,255,${0.3+Math.random()*0.6})`;sCtx.fill();
  }
}
drawStars();
window.addEventListener('resize',()=>{drawStars();resizeWheel();});

// 전구
const lc=['#ff4444','#44aaff','#ffdd00','#44ff88','#ff88cc','#ff8800'];
['lights','lights2'].forEach(id=>{
  const s=document.getElementById(id);
  for(let i=0;i<22;i++){
    const d=document.createElement('div');d.className='light';
    d.style.color=lc[i%lc.length];d.style.background=lc[i%lc.length];
    s.appendChild(d);
  }
});

const canvasEl=document.getElementById('wheelCanvas');
const ctx=canvasEl.getContext('2d');
const wrap=document.getElementById('canvas-wrap');
const resultNum=document.getElementById('result-num');

// 색상 팔레트 (6색 반복)
const palette=['#E24B4A','#378ADD','#639922','#BA7517','#7F77DD','#D4537E'];

// 모드
let MODE=6;
let SEGS, segColors, labels;

function buildMode(n){
  segColors=[];labels=[];
  if(n===6){
    SEGS=18;
    for(let r=0;r<3;r++) for(let i=1;i<=6;i++){
      labels.push(String(i));
      segColors.push(palette[(i-1)%palette.length]);
    }
  } else {
    SEGS=n;
    for(let i=1;i<=n;i++){
      labels.push(String(i));
      segColors.push(palette[(i-1)%palette.length]);
    }
  }
}
buildMode(6);

function setMode(n){
  if(spinning) return;
  MODE=n;
  buildMode(n);
  currentAngle=0;
  resultNum.textContent='—';
  resultNum.style.color='#ffd700';
  resultNum.style.textShadow='';
  document.getElementById('btn6').classList.toggle('active', n===6);
  document.getElementById('btn32').classList.toggle('active', n===32);
  resizeWheel();
}

let R=200,CX,CY,currentAngle=0,spinning=false;

function resizeWheel(){
  const availH=Math.max(window.innerHeight-56,300);
  R=Math.max(Math.min(Math.floor(availH*0.36),220),80);
  const size=R*2+10;
  canvasEl.width=size;canvasEl.height=size;
  wrap.style.width=size+'px';wrap.style.height=size+'px';
  CX=R+5;CY=R+5;
  drawWheel(currentAngle);
}

function drawWheel(angle){
  if(!CX||R<=0) return;
  const slice=(2*Math.PI)/SEGS;
  ctx.clearRect(0,0,canvasEl.width,canvasEl.height);

  for(let i=0;i<SEGS;i++){
    const s=angle+i*slice,e=s+slice,m=s+slice/2;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,s,e);ctx.closePath();
    ctx.fillStyle=segColors[i];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=1.5;ctx.stroke();

    // 글씨 크기: 칸이 많을수록 작게
    const fs=Math.max(Math.round(R*(SEGS<=6?0.15:SEGS<=12?0.1:0.075)),10);
    ctx.save();
    ctx.translate(CX+(R*0.67)*Math.cos(m),CY+(R*0.67)*Math.sin(m));
    ctx.rotate(m+Math.PI/2);
    ctx.fillStyle='#fff';
    ctx.font=`bold ${fs}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=3;
    ctx.fillText(labels[i],0,0);
    ctx.restore();
  }

  // 테두리
  ctx.beginPath();ctx.arc(CX,CY,R,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,220,80,0.85)';ctx.lineWidth=5;ctx.stroke();
  // 중앙 원
  const cr=Math.max(Math.round(R*0.17),12);
  ctx.beginPath();ctx.arc(CX,CY,cr,0,2*Math.PI);
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,200,0,0.5)';ctx.shadowBlur=10;
  ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='#ddd';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,cr*0.22,0,2*Math.PI);ctx.fillStyle='#ccc';ctx.fill();
}

function getWinner(angle){
  const slice=(2*Math.PI)/SEGS;
  let norm=((-Math.PI/2-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  return Math.floor(norm/slice)%SEGS;
}

function easeOut(t){ return 1-Math.pow(1-t,4); }

function spawnConfetti(color){
  for(let i=0;i<32;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.left=(25+Math.random()*50)+'%';el.style.top='25%';
    el.style.background=[color,'#ffd700','#fff','#ff88cc'][Math.floor(Math.random()*4)];
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.style.animationDelay=(Math.random()*0.5)+'s';
    el.style.animationDuration=(1.4+Math.random()*0.8)+'s';
    document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
  }
}

function spin(){
  if(spinning) return;
  spinning=true;
  document.getElementById('center-btn').textContent='...';
  document.getElementById('spinBtn').textContent='돌아가는 중...';
  resultNum.style.transform='scale(0.8)';
  resultNum.style.color='#ffd700';
  resultNum.textContent='—';

  const total=(4+Math.random()*2)*2*Math.PI+Math.random()*2*Math.PI;
  const dur=6000+Math.random()*1000;
  const sa=currentAngle,st=performance.now();

  function frame(now){
    const t=Math.min((now-st)/dur,1);
    currentAngle=sa+total*easeOut(t);
    drawWheel(currentAngle);
    if(t<1){requestAnimationFrame(frame);return;}
    currentAngle=sa+total;
    drawWheel(currentAngle);
    spinning=false;
    document.getElementById('center-btn').textContent='돌리기';
    document.getElementById('spinBtn').textContent='🎡 돌리기';
    const idx=getWinner(currentAngle);
    resultNum.textContent=labels[idx];
    resultNum.style.color=segColors[idx];
    resultNum.style.textShadow=`0 0 32px ${segColors[idx]}`;
    resultNum.style.transform='scale(1.15)';
    setTimeout(()=>{resultNum.style.transform='scale(1)';},350);
    spawnConfetti(segColors[idx]);
  }
  requestAnimationFrame(frame);
}

document.getElementById('center-btn').addEventListener('click',spin);
document.getElementById('spinBtn').addEventListener('click',spin);
resizeWheel();
</script>
</body>
</html>
